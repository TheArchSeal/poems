    <ul>
        <li>oh to wither into dust</li>
        <li>oh to crumble into powder</li>
        <li>oh to burn and turn to ash</li>
        <li>oh to freeze and crack and shatter</li>

        <li>oh to splinter into thousands</li>
        <li>oh to tear and turn to threads</li>

    </ul>
